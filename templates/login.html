<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - SST Freedom</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 10% 20%, rgba(14, 165, 233, 0.1) 0%, transparent 40%), var(--bg-app);
        }
        .login-card {
            width: 100%;
            max-width: 440px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card p-3">
            <div class="card-premium animate-fade-in card-primary">
                <div class="text-center mb-4">
                    <div class="sidebar-logo justify-content-center mb-2 fs-2">
                        <i class="bi bi-shield-check-fill"></i> SST Freedom
                    </div>
                    <p class="text-secondary">Gestão Integrada de Segurança e Saúde Ocupacional</p>
                </div>

                {% if form.errors %}
                <div class="alert alert-danger rounded-4 py-2" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> Usuário ou senha incorretos.
                </div>
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label text-secondary fw-semibold">Usuário</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-secondary border-end-0 text-secondary" style="border-radius: 12px 0 0 12px;">
                                <i class="bi bi-person-fill"></i>
                            </span>
                            <input type="text" name="username" id="id_username" class="form-control form-control-premium border-start-0" placeholder="Digite seu usuário" required autofocus style="border-radius: 0 12px 12px 0 !important;">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label text-secondary fw-semibold">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-secondary border-end-0 text-secondary" style="border-radius: 12px 0 0 12px;">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input type="password" name="password" id="id_password" class="form-control form-control-premium border-start-0" placeholder="Digite sua senha" required style="border-radius: 0 12px 12px 0 !important;">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-premium btn-premium-primary w-100 py-3 mb-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Entrar
                    </button>
                </form>
            </div>
            <div class="text-center mt-4">
                <small class="text-muted">Desenvolvido para programas de segurança industrial</small>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
