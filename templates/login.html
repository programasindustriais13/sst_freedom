<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar — SST Freedom | Pneus Freedom</title>
    <meta name="description" content="Acesso ao sistema SST Freedom — Gestão Integrada de Segurança e Saúde Ocupacional">
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Tema Institucional Pneus Freedom — SPEC-2026-003 -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/custom.css' %}">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 15% 25%, rgba(201, 150, 42, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 85% 75%, rgba(201, 150, 42, 0.05) 0%, transparent 45%),
                var(--surface-page);
        }
        .login-card {
            width: 100%;
            max-width: 440px;
        }
        .login-logo-wrap {
            text-align: center;
            margin-bottom: 20px;
        }
        .login-tagline {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 6px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card p-3">
            <div class="card-premium animate-fade-in card-primary">

                <!-- Logo da empresa -->
                <div class="login-logo-wrap">
                    <img
                        src="{% static 'images/logo_freedom.png' %}"
                        alt="Logo Pneus Freedom"
                        class="login-logo-img"
                    >
                    <p class="login-tagline">Gestão Integrada de Segurança e Saúde Ocupacional</p>
                </div>

                <!-- Erro de autenticação -->
                {% if form.errors %}
                <div class="alert alert-danger rounded-4 py-2 d-flex align-items-center gap-2" role="alert">
                    <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
                    <span>Usuário ou senha incorretos.</span>
                </div>
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-semibold">Usuário</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0" style="border-radius: 10px 0 0 10px;">
                                <i class="bi bi-person-fill"></i>
                            </span>
                            <input
                                type="text"
                                name="username"
                                id="id_username"
                                class="form-control border-start-0"
                                placeholder="Digite seu usuário"
                                required
                                autofocus
                                autocomplete="username"
                                style="border-radius: 0 10px 10px 0 !important;"
                            >
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="id_password" class="form-label fw-semibold">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0" style="border-radius: 10px 0 0 10px;">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input
                                type="password"
                                name="password"
                                id="id_password"
                                class="form-control border-start-0"
                                placeholder="Digite sua senha"
                                required
                                autocomplete="current-password"
                                style="border-radius: 0 10px 10px 0 !important;"
                            >
                        </div>
                    </div>

                    <button type="submit" id="btn-login" class="btn btn-premium btn-premium-primary w-100 py-3 mb-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i> Entrar
                    </button>
                </form>
            </div>

            <div class="text-center mt-4">
                <small style="color: var(--text-muted);">Desenvolvido para programas de segurança industrial</small>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
